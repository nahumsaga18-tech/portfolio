<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Nahum Jacob Ilagan</title>
    <style>
        /* --- SMOOTH TRANSITION ANIMATION --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        html {
            scroll-behavior: smooth;
        }

        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            background: #0f172a; 
            color: #e2e8f0; 
            line-height: 1.6;
            animation: fadeIn 0.8s ease-out;
        }

        /* --- PARTICLES BACKGROUND CSS --- */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            background-color: #043564; /* Nyan Cat Blue */
        }

        header { 
            background: rgba(30, 41, 59, 0.85); /* Slightly transparent */
            padding: 40px 20px; 
            text-align: center; 
        }

        header h1 { margin: 0; font-size: 2.5em; color: #38bdf8; }
        
        nav { margin-top: 15px; }
        nav a { 
            color: #e2e8f0; 
            margin: 0 15px; 
            text-decoration: none; 
            font-weight: bold; 
            transition: color 0.3s ease, transform 0.2s ease;
            display: inline-block;
        }
        
        nav a:hover { 
            color: #38bdf8; 
            transform: scale(1.1);
        }

        .active {
            color: #38bdf8;
        }

        section { 
            padding: 60px 20px; 
            max-width: 900px; 
            margin: auto; 
            position: relative; 
        }

        h2 { color: #38bdf8; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        
        .contact-info {
            background: rgba(30, 41, 59, 0.9); /* Slightly transparent */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-top: 20px;
        }

        .contact-info p {
            font-size: 1.1em;
            margin: 15px 0;
        }

        .contact-info a { 
            color: #38bdf8; 
            text-decoration: none; 
            transition: 0.3s;
        }

        .contact-info a:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        footer { text-align: center; padding: 30px; background: #1e293b; margin-top: 40px; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <h1>Nahum Jacob Ilagan</h1>
    <p>Web Developer | Designer | Student</p>
    <nav>
        <a href="index.html">About</a>
        <a href="techstack.html">Tech Stack</a> 
        <a href="achievements.html">Achievements</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>
</header>

        <p><strong>Email:</strong> <a href="mailto:nahumsaga18@gmail.com">nahumsaga18@gmail.com</a></p>
        <p><strong>Facebook:</strong> <a href="https://www.facebook.com/nhum.jcob" target="_blank">facebook.com/nhum.jcob</a></p>
        <p><strong>GitHub:</strong> <a href="https://github.com/nahumsaga18-tech" target="_blank">github.com/nahumsaga18-tech</a></p>
    </div>
</section>

<footer><p>© 2026 Nahum Jacob Ilagan. All rights reserved.</p></footer>
