<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Nahum Jacob Ilagan</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        body { margin: 0; font-family: Arial, sans-serif; background: #043564; color: #e2e8f0; min-height: 100vh; overflow-x: hidden; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        /* Consistent Navbar styling */
        header { background: rgba(30, 41, 59, 0.9) !important; backdrop-filter: blur(10px); }
        .navbar-item { color: #e2e8f0 !important; font-weight: bold; font-size: 0.85rem; }
        .navbar-item:hover, .navbar-item.is-active { color: #38bdf8 !important; background: transparent !important; }
        
        /* Contact Box Customization */
        .contact-box { 
            background: rgba(15, 23, 42, 0.9) !important; 
            border: 1px solid rgba(56, 189, 248, 0.3); 
            backdrop-filter: blur(10px);
            animation: fadeIn 0.6s ease;
            max-width: 450px;
            margin: 60px auto;
        }
        
        .contact-link {
            transition: 0.3s;
            margin-bottom: 1rem;
            justify-content: center;
        }
        .contact-link:hover { transform: translateX(5px); }
        
        .title { color: #38bdf8 !important; }
        .contact-title { color: #38bdf8 !important; margin-bottom: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <nav class="navbar is-transparent" role="navigation" aria-label="main navigation">
        <div class="container">
            <div class="navbar-brand">
                <span class="navbar-item">
                    <h1 class="title is-5">Nahum Jacob Ilagan</h1>
                </span>
            </div>
            <div class="navbar-menu is-active has-text-centered">
                <div class="navbar-end">
                    <a href="index.html" class="navbar-item">Home</a>
                    <a href="about.html" class="navbar-item">About</a>
                    <a href="techstack.html" class="navbar-item">Tech Stack</a>
                    <a href="achievements.html" class="navbar-item">Achievements</a>
                    <a href="contact.html" class="navbar-item is-active">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <div class="box contact-box has-text-centered">
                <h3 class="is-size-4 contact-title">Connect With Me</h3>
                
                <a href="mailto:nahumsaga18@gmail.com" class="button is-info is-outlined is-fullwidth contact-link">
                    <span class="icon"><i class="fas fa-envelope"></i></span>
                    <span>nahumsaga18@gmail.com</span>
                </a>

                <a href="https://github.com/nahumsaga18-tech" target="_blank" class="button is-info is-outlined is-fullwidth contact-link">
                    <span class="icon"><i class="fab fa-github"></i></span>
                    <span>nahumsaga18-tech</span>
                </a>
            </div>
        </div>
    </section>

    <footer class="footer has-background-transparent"></footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 8 },
                "shape": { "type": "image", "image": { "src": "https://upload.wikimedia.org/wikipedia/en/e/ed/Nyan_cat_250px_frame.PNG", "width": 100, "height": 100 } },
                "size": { "value": 40, "random": true },
                "move": { "enable": true, "speed": 4, "direction": "right", "straight": true, "out_mode": "out" }
            }
        });
    </script>
</body>
</html>
