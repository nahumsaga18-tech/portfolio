<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Nahum Jacob Ilagan</title>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        body { margin: 0; font-family: Arial, sans-serif; background: #043564; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        header { padding: 20px; text-align: center; background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(10px); }
        header h1 { font-size: 1.2rem; color: #38bdf8; margin: 0; text-transform: none; }
        nav { margin-top: 10px; }
        nav a { color: #e2e8f0; margin: 0 10px; text-decoration: none; font-weight: bold; font-size: 0.85rem; transition: 0.3s; }
        nav a:hover, .active { color: #38bdf8; }
        .hero { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 20px; animation: fadeIn 1s ease-out; }
        .hero-img { width: 300px; height: 300px; border-radius: 50%; border: 6px solid #38bdf8; object-fit: cover; margin-bottom: 25px; transition: 0.3s; }
        .hero-img:hover { transform: scale(1.05); }
        footer { padding: 15px; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <header>
        <h1>Nahum Jacob Ilagan</h1>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About</a>
            <a href="techstack.html">Tech Stack</a>
            <a href="achievements.html">Achievements</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <div class="hero">
        <img src="profile.jpg" alt="Nahum Jacob Ilagan" class="hero-img">
        <h2>Web Developer</h2>
        <p>Minimalist Designer | Software Developer | Student</p>
    </div>
    <footer></footer>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 10, "density": { "enable": true, "value_area": 800 } },
                "shape": { "type": "image", "image": { "src": "https://doc-08-ag-docs.googleusercontent.com/docs/secure7/6886675005822971212/12557434720000000000/03987304193657743303/1Y3p2n7-3-K1_O_Wj0_5-K_6qE5x8x8_H?authuser=0", "width": 100, "height": 100 } },
                "opacity": { "value": 1 },
                "size": { "value": 40, "random": true },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 4, "direction": "right", "random": false, "straight": true, "out_mode": "out" }
            },
            "interactivity": { "events": { "onhover": { "enable": false } } },
            "retina_detect": true
        });
    </script>
</body>
</html>
