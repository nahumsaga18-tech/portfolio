<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements | Nahum Jacob Ilagan</title>
    <style>
        /* --- NEW SMOOTH TRANSITION ANIMATION --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        html {
            scroll-behavior: smooth;
        }

        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            background: #0f172a; 
            color: #e2e8f0; 
            line-height: 1.6;
            animation: fadeIn 0.8s ease-out; 
        }

        /* --- PARTICLES BACKGROUND CSS --- */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            background-color: #043564; /* Nyan Cat Blue */
        }

        header { 
            background: rgba(30, 41, 59, 0.85); 
            padding: 40px 20px; 
            text-align: center; 
        }
        header h1 { margin: 0; font-size: 2.5em; color: #38bdf8; }
        
        nav { margin-top: 15px; }
        nav a { 
            color: #e2e8f0; 
            margin: 0 15px; 
            text-decoration: none; 
            font-weight: bold; 
            transition: color 0.3s ease, transform 0.2s ease;
            display: inline-block;
        }
        nav a:hover { 
            color: #38bdf8; 
            transform: scale(1.1);
        }

        .active {
            color: #38bdf8;
        }

        section { padding: 60px 20px; max-width: 900px; margin: auto; position: relative; }
        h2 { color: #38bdf8; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        
        .achievements-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .card { 
            background: rgba(30, 41, 59, 0.85); /* Semi-transparent cards */
            padding: 20px; 
            border-radius: 10px; 
            transition: 0.3s; 
            text-align: center; 
            height: 100%; 
            box-sizing: border-box; 
            backdrop-filter: blur(5px); /* Adds a nice frosted glass effect */
        }
        .card:hover { transform: translateY(-5px); background: rgba(51, 65, 85, 0.9); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        .cert-img {
            width: 120px;
            height: 120px;
            margin-bottom: 15px;
            object-fit: contain;
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .cert-img:hover {
            transform: scale(1.05);
        }

        /* Modal Styles */
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.95);
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            max-width: 80%;
            max-height: 70%;
            border: 8px solid #38bdf8;
            border-radius: 15px;
            background: white;
            padding: 10px;
        }

        .modal-link {
            margin-top: 20px;
            color: #38bdf8;
            font-size: 1.2em;
            font-weight: bold;
            text-decoration: none;
            background: #1e293b;
            padding: 10px 25px;
            border-radius: 30px;
            border: 2px solid #38bdf8;
            transition: 0.3s;
        }

        .modal-link:hover {
            background: #38bdf8;
            color: #1e293b;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
        
        footer { text-align: center; padding: 30px; background: #1e293b; margin-top: 40px; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header>
    <h1>Nahum Jacob Ilagan</h1>
    <nav>
        <a href="index.html">About</a>
        <a href="techstack.html">Tech Stack</a> <a href="achievements.html" class="active">Achievements</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section id="achievements">
    <h2>Achievements</h2>
    <div class="achievements-grid">
        <div class="card">
            <img src="java_badge.png" alt="Java Certification" class="cert-img" 
                 onclick="zoomImage(this, 'https://www.linkedin.com/in/nahum-jacob-ilagan-8885aa409/details/certifications/')">
            <h3>IT Specialist - Java</h3>
        </div>

        <div class="card">
            <img src="networking_badge.png" alt="Networking Basics" class="cert-img" 
                 onclick="zoomImage(this, 'https://www.linkedin.com/in/nahum-jacob-ilagan-8885aa409/details/certifications/')">
            <h3>Networking Basics</h3>
        </div>

        <div class="card">
            <img src="powerpoint_badge.png" alt="PowerPoint Certification" class="cert-img" 
                 onclick="zoomImage(this, 'https://www.linkedin.com/in/nahum-jacob-ilagan-8885aa409/details/certifications/')">
            <h3>Microsoft PowerPoint Specialist</h3>
        </div>

        <div class="card">
            <img src="python_badge.png" alt="Python Certification" class="cert-img" 
                 onclick="zoomImage(this, 'https://www.linkedin.com/in/nahum-jacob-ilagan-8885aa409/details/certifications/')">
            <h3>Python Essentials 1</h3>
        </div>
    </div>
</section>

<div id="imageModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="expandedImg">
    <a href="#" id="modalLinkedInLink" target="_blank" class="modal-link">Verify on LinkedIn</a>
</div>

<footer><p>© 2026 Nahum Jacob Ilagan. All rights reserved.</p></footer>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS.load('particles-js', 'particles.json', function() {
        console.log('Nyan Cat particles loaded on Achievements page!');
    });

    function zoomImage(imgElement, linkedinUrl) {
        var modal = document.getElementById("imageModal");
        var modalImg = document.getElementById("expandedImg");
        var modalLink = document.getElementById("modalLinkedInLink");

        modal.style.display = "flex";
        modalImg.src = imgElement.src;
        modalLink.href = linkedinUrl;
    }

    function closeModal() {
        document.getElementById("imageModal").style.display = "none";
    }

    window.onclick = function(event) {
        var modal = document.getElementById("imageModal");
        if (event.target == modal) {
            closeModal();
        }
    }
</script>

</body>
</html>
