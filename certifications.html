<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certifications | Nahum Jacob Ilagan</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        body { margin: 0; font-family: Arial, sans-serif; background: #043564; color: #e2e8f0; min-height: 100vh; overflow-x: hidden; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        /* Updated Navbar styling to fix the missing dark part in image_2c1b35.png */
        .navbar { 
            background: rgba(30, 41, 59, 0.9) !important; 
            backdrop-filter: blur(10px); 
        }

        .navbar-item, .navbar-link { color: #e2e8f0 !important; font-weight: bold; font-size: 0.85rem; }
        
        /* Mobile menu adjustment */
        @media screen and (max-width: 1023px) {
            .navbar-menu { 
                background: rgba(30, 41, 59, 0.98) !important; 
                position: absolute !important; 
                width: 100%; 
                left: 0;
                box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            }
        }

        .navbar-burger { color: #38bdf8 !important; }
        .navbar-item:hover, .navbar-item.is-active { color: #38bdf8 !important; background: transparent !important; }
        
        /* Custom Card styling */
        .custom-card { 
            background: rgba(15, 23, 42, 0.8) !important; 
            border: 1px solid rgba(56, 189, 248, 0.1); 
            border-radius: 12px;
            transition: 0.3s;
            cursor: pointer;
            animation: fadeIn 0.6s ease;
        }
        .custom-card:hover { transform: translateY(-5px); border-color: #38bdf8; }
        .cert-img { width: 120px; height: 120px; background: white; padding: 8px; border-radius: 8px; margin: 0 auto; display: block; }
        .card-title { color: #38bdf8 !important; margin-top: 15px; font-weight: bold; }
        
        /* Modal Customization */
        .modal-content img { border: 3px solid #38bdf8; border-radius: 10px; }
        .title { color: #38bdf8 !important; }

        /* Footer fix to prevent white gaps */
        .footer {
            background-color: transparent !important;
            padding: 2rem 1.5rem !important;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <!-- Removed 'is-transparent' to show the dark top bar -->
    <nav class="navbar" role="navigation" aria-label="main navigation">
        <div class="container">
            <div class="navbar-brand">
                <span class="navbar-item">
                    <h1 class="title is-5">Nahum Jacob Ilagan</h1>
                </span>
                <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navMenu">
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                </a>
            </div>
            
            <div id="navMenu" class="navbar-menu has-text-centered">
                <div class="navbar-end">
                    <a href="index.html" class="navbar-item">Home</a>
                    <a href="about.html" class="navbar-item">About</a>
                    <a href="techstack.html" class="navbar-item">Tech Stack</a>
                    <a href="certifications.html" class="navbar-item is-active">Certifications</a>
                    <a href="contact.html" class="navbar-item">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <h2 class="title is-2 has-text-centered mb-6">Certifications</h2>
            <div class="columns is-multiline is-centered">
                <div class="column is-one-quarter-desktop is-half-tablet">
                    <div class="box custom-card" onclick="zoomImage('images/java_badge.png', 'https://www.linkedin.com/in/nahum-jacob-ilagan-8885aa409/')">
                        <img src="images/java_badge.png" class="cert-img" alt="Java">
                        <h3 class="has-text-centered card-title">Java</h3>
                    </div>
                </div>
                <div class="column is-one-quarter-desktop is-half-tablet">
                    <div class="box custom-card" onclick="zoomImage('images/networking_badge.png', 'https://www.linkedin.com/in/nahum-jacob-ilagan-8885aa409/')">
                        <img src="images/networking_badge.png" class="cert-img" alt="Networking">
                        <h3 class="has-text-centered card-title">Networking</h3>
                    </div>
                </div>
                <div class="column is-one-quarter-desktop is-half-tablet">
                    <div class="box custom-card" onclick="zoomImage('images/powerpoint_badge.png', 'https://www.linkedin.com/in/nahum-jacob-ilagan-8885aa409/')">
                        <img src="images/powerpoint_badge.png" class="cert-img" alt="PowerPoint">
                        <h3 class="has-text-centered card-title">PowerPoint</h3>
                    </div>
                </div>
                <div class="column is-one-quarter-desktop is-half-tablet">
                    <div class="box custom-card" onclick="zoomImage('images/python_badge.png', 'https://www.linkedin.com/in/nahum-jacob-ilagan-8885aa409/')">
                        <img src="images/python_badge.png" class="cert-img" alt="Python">
                        <h3 class="has-text-centered card-title">Python</h3>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="imageModal" class="modal">
        <div class="modal-background" onclick="closeModal()"></div>
        <div class="modal-content has-text-centered">
            <p class="image">
                <img id="expandedImg" src="" alt="Certificate">
            </p>
            <div class="mt-4">
                <a href="#" id="modalLinkedInLink" target="_blank" class="button is-info is-rounded has-text-weight-bold">Verify Certificate</a>
            </div>
        </div>
        <button class="modal-close is-large" aria-label="close" onclick="closeModal()"></button>
    </div>

    <footer class="footer"></footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const $navbarBurgers = Array.prototype.slice.call(document.querySelectorAll('.navbar-burger'), 0);
            if ($navbarBurgers.length > 0) {
                $navbarBurgers.forEach( el => {
                    el.addEventListener('click', () => {
                        const target = el.dataset.target;
                        const $target = document.getElementById(target);
                        el.classList.toggle('is-active');
                        $target.classList.toggle('is-active');
                    });
                });
            }
        });

        function zoomImage(src, link) { 
            document.getElementById("imageModal").classList.add("is-active"); 
            document.getElementById("expandedImg").src = src; 
            document.getElementById("modalLinkedInLink").href = link; 
        }
        function closeModal() { 
            document.getElementById("imageModal").classList.remove("is-active"); 
        }
    </script>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", { "particles": { "number": { "value": 10 }, "shape": { "type": "image", "image": { "src": "https://upload.wikimedia.org/wikipedia/en/e/ed/Nyan_cat_250px_frame.PNG", "width": 100, "height": 100 } }, "size": { "value": 40, "random": true }, "move": { "enable": true, "speed": 4, "direction": "right", "straight": true, "out_mode": "out" } } });
    </script>
</body>
</html>
