<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Stack | Nahum Jacob Ilagan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        body { margin: 0; font-family: Arial, sans-serif; background: #043564; color: #e2e8f0; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        header { background: rgba(30, 41, 59, 0.9); padding: 15px; text-align: center; }
        header h1 { font-size: 1.2rem; color: #38bdf8; text-transform: none; }
        nav a { color: #e2e8f0; margin: 0 10px; text-decoration: none; font-weight: bold; font-size: 0.85rem; }
        section { padding: 40px 20px; max-width: 900px; margin: auto; animation: fadeIn 0.8s ease; }
        .tech-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .tech-card { background: rgba(15, 23, 42, 0.8); padding: 25px; border-radius: 12px; border: 1px solid rgba(56, 189, 248, 0.2); backdrop-filter: blur(8px); }
        .tech-list { list-style: none; padding: 0; }
        .tech-list li { padding: 10px 0; display: flex; align-items: center; gap: 12px; }
        .tech-list i { color: #38bdf8; width: 25px; text-align: center; }
        footer { padding: 20px; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <header>
        <h1>Nahum Jacob Ilagan</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="techstack.html" class="active">Tech Stack</a>
            <a href="achievements.html">Achievements</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <section>
        <div class="tech-grid">
            <div class="tech-card">
                <h3>Languages</h3>
                <ul class="tech-list">
                    <li><i class="fab fa-java"></i> Java</li>
                    <li><i class="fab fa-python"></i> Python</li>
                    <li><i class="fas fa-database"></i> SQL (PostgreSQL)</li>
                </ul>
            </div>
            <div class="tech-card">
                <h3>Tools</h3>
                <ul class="tech-list">
                    <li><i class="fab fa-github"></i> Git & GitHub</li>
                    <li><i class="fas fa-mobile-alt"></i> Android Studio</li>
                    <li><i class="fas fa-code"></i> VS Code & pgAdmin</li>
                </ul>
            </div>
        </div>
    </section>
    <footer></footer>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 10 },
                "shape": { "type": "image", "image": { "src": "https://upload.wikimedia.org/wikipedia/en/e/ed/Nyan_cat_250px_frame.PNG", "width": 100, "height": 100 } },
                "size": { "value": 40, "random": true },
                "move": { "enable": true, "speed": 4, "direction": "right", "straight": true, "out_mode": "out" }
            }
        });
    </script>
</body>
</html>
