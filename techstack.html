    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div>
    
    <nav class="navbar is-fixed-top" role="navigation" aria-label="main navigation">
        <div class="container">
            <div class="navbar-brand">
                <span class="navbar-item"><h1 class="title is-5 name-highlight">Nahum Jacob Ilagan</h1></span>
                <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navMenu">
                    <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span>
                </a>
            </div>
            <div id="navMenu" class="navbar-menu has-text-centered">
                <div class="navbar-end">
                    <a href="index.html" class="navbar-item">Home</a>
                    <a href="about.html" class="navbar-item">About</a>
                    <a href="techstack.html" class="navbar-item is-active">Tech Stack</a>
                    <a href="certifications.html" class="navbar-item">Certifications</a>
                    <a href="contact.html" class="navbar-item">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <div class="has-text-centered mb-6">
                <h3 class="is-size-4 category-title mb-4">Languages</h3>
                <div class="columns is-mobile is-multiline is-centered">
                    <div class="column is-4-desktop is-4-tablet is-6-mobile">
                        <div class="box tech-card">
                            <i class="fab fa-html5 tech-icon"></i><span class="tech-name">HTML5</span>
                        </div>
                    </div>
                    <div class="column is-4-desktop is-4-tablet is-6-mobile">
                        <div class="box tech-card">
                            <i class="fab fa-css3-alt tech-icon"></i><span class="tech-name">CSS3</span>
                        </div>
                    </div>
                    <div class="column is-4-desktop is-4-tablet is-6-mobile">
                        <div class="box tech-card">
                            <i class="fab fa-js tech-icon"></i><span class="tech-name">JavaScript</span>
                        </div>
                    </div>
                    <div class="column is-4-desktop is-4-tablet is-6-mobile">
                        <div class="box tech-card">
                            <i class="fab fa-java tech-icon"></i><span class="tech-name">Java</span>
                        </div>
                    </div>
                    <div class="column is-4-desktop is-4-tablet is-6-mobile">
                        <div class="box tech-card">
                            <i class="fab fa-python tech-icon"></i><span class="tech-name">Python</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="has-text-centered">
                <h3 class="is-size-4 category-title mb-4">Tools</h3>
                <div class="columns is-mobile is-multiline is-centered">
                    <div class="column is-4-desktop is-4-tablet is-6-mobile">
                        <div class="box tech-card">
                            <i class="fab fa-github tech-icon"></i><span class="tech-name">GitHub</span>
                        </div>
                    </div>
                    <div class="column is-4-desktop is-4-tablet is-6-mobile">
                        <div class="box tech-card">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Android_Studio_icon_%282023%29.svg" class="tech-card-logo" alt="Android Studio">
                            <span class="tech-name">Android Studio</span>
                        </div>
                    </div>
                    <div class="column is-4-desktop is-4-tablet is-6-mobile">
                        <div class="box tech-card">
                            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg" class="tech-card-logo" alt="VS Code">
                            <span class="tech-name">VS Code</span>
                        </div>
                    </div>
                    <div class="column is-4-desktop is-4-tablet is-6-mobile">
                        <div class="box tech-card">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Postgresql_elephant.svg" class="tech-card-logo" alt="PostgreSQL">
                            <span class="tech-name">PostgreSQL</span>
                        </div>
                    </div>
                    <div class="column is-4-desktop is-4-tablet is-6-mobile">
                        <div class="box tech-card">
                            <img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/pgadmin.svg" class="tech-card-logo" alt="pgAdmin">
                            <span class="tech-name">pgAdmin</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer"></footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>

</html>
